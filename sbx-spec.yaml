schemaVersion: "1"
kind: mixin
name: my-sandbox-kit

environment:
  variables:
    ANTHROPIC_API_KEY: ""
    ANTHROPIC_BASE_URL: "http://host.docker.internal:6655/anthropic/"
    ANTHROPIC_MODEL: "anthropic--claude-opus-latest"
    CLAUDE_CODE_ENABLE_TELEMETRY: "1"
    OTEL_METRICS_EXPORTER: "otlp"
    OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://host.docker.internal:4318"
    SEARXNG_URL: "http://host.docker.internal:8888"
    CLAUDE_AUTOCOMPACT_PCT_OVERRIDE: "70"
    # Both spellings: some tools (curl, requests) read lowercase, others (Go-based, Docker CLI) read uppercase
    no_proxy: "localhost,127.0.0.1,::1,gateway.docker.internal"
    NO_PROXY: "localhost,127.0.0.1,::1,gateway.docker.internal"

commands:
  install:
    - command: "mkdir -p /home/agent/.claude/skills && git clone --depth 1 https://github.com/Valetudox/claude-searxng-plugin /tmp/searxng-plugin && cp -r /tmp/searxng-plugin/.claude/skills/searchx /home/agent/.claude/skills/searchx && cp /tmp/searxng-plugin/.claude/settings.json /home/agent/.claude/settings.json && rm -rf /tmp/searxng-plugin"
      user: "1000"

    - command: "git clone --depth 1 https://github.com/199-biotechnologies/claude-deep-research-skill /home/agent/.claude/skills/deep-research"
      user: "1000"

    # Clone council as a skill only. Its .claude-plugin/ dir makes Claude Code
    # auto-register it as a plugin, exposing all 18 members as namespaced
    # subagents (council:council-{name}) — which /council resolves via its
    # "Asset Resolution" section. We deliberately DO NOT `cp -sf` the agents
    # into ~/.claude/agents/: that would load a second, standalone copy of the
    # same 18 descriptions into the system prompt (36 total), doubling the
    # always-on context cost for zero benefit.
    - command: 'git clone --depth 1 https://github.com/0xNyk/council-of-high-intelligence /home/agent/.claude/skills/council'
      user: "1000"

    - command: "git clone --depth 1 https://github.com/kfchou/wiki-skills /tmp/wiki-skills && cp -r /tmp/wiki-skills/skills/wiki-* /home/agent/.claude/skills/ && rm -rf /tmp/wiki-skills"
      user: "1000"

    - command: 'uv tool install "semble[mcp]"'
      user: "1000"

    - command: |
        set -euo pipefail
        # qmd's native deps (tree-sitter-javascript, better-sqlite3) build via
        # node-gyp — arm64 has no prebuild binary, so g++/make must be present.
        # The base image ships neither.
        #
        # `apt-get update` refreshes EVERY configured source, so a transient
        # mirror-sync error on an unrelated repo (e.g. download.docker.com:
        # "File has unexpected size … Mirror sync in progress?") makes the
        # whole update exit 100 and aborts the build — even though the Ubuntu
        # indices we actually need fetched fine ("old ones used instead").
        # So: retry a few times for transient hiccups, and never let a failed
        # `update` abort the build. The `install` below is the real gate — it
        # fails loudly on its own if build-essential is genuinely unavailable.
        for i in 1 2 3; do
          sudo apt-get update -qq && break
          echo "apt-get update attempt $i failed (transient?); retrying in 5s..."
          sleep 5
        done
        sudo apt-get install -y --no-install-recommends build-essential python3
      user: "1000"
      description: Install C/C++ toolchain for npm native addons (qmd)

    - command: |
        set -euo pipefail
        # qmd needs Node.js >= 22. Install via nvm if the system node is missing or too old.
        need_install=1
        if command -v node >/dev/null 2>&1; then
            major=$(node -p 'process.versions.node.split(".")[0]')
            [ "$major" -ge 22 ] && need_install=0 || true
        fi
        if [ "$need_install" = 1 ]; then
            export NVM_DIR="$HOME/.nvm"
            if [ ! -s "$NVM_DIR/nvm.sh" ]; then
                curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
            fi
            # shellcheck disable=SC1091
            . "$NVM_DIR/nvm.sh"
            nvm install 22
            nvm alias default 22
            # Persist for future bash invocations (nvm.sh is safe; completions are NOT sourced).
            grep -q 'NVM_DIR="$HOME/.nvm"' /etc/sandbox-persistent.sh 2>/dev/null || \
                echo 'export NVM_DIR="$HOME/.nvm"' | sudo tee -a /etc/sandbox-persistent.sh >/dev/null
            grep -q 'nvm.sh' /etc/sandbox-persistent.sh 2>/dev/null || \
                echo '[ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"' | sudo tee -a /etc/sandbox-persistent.sh >/dev/null
        else
            # nvm is already active; just source it if present.
            [ -s "$HOME/.nvm/nvm.sh" ] && . "$HOME/.nvm/nvm.sh" || true
        fi
        npm install -g @tobilu/qmd
        # Persist the npm-global bin dir so startup scripts (which run as
        # a fresh `su ... bash -lc` with a bare /etc/environment PATH) can
        # find qmd. Without this the qmd-index startup step logs
        # "[qmd-index] qmd not found, skipping" even though qmd is installed.
        NPM_BIN="$(npm config get prefix)/bin"
        grep -q "$NPM_BIN" /etc/sandbox-persistent.sh 2>/dev/null || \
            echo "export PATH=\"$NPM_BIN:\$PATH\"" | sudo tee -a /etc/sandbox-persistent.sh >/dev/null
        command -v qmd >/dev/null || { echo "MISSING: qmd after npm install"; exit 1; }
        echo "[OK] qmd installed: $(qmd --version 2>/dev/null || echo unknown)"
      user: "1000"
      description: Install qmd (Node >= 22 via nvm if needed) from npm

    - command: |
        set -euo pipefail
        # Playwright MCP lets Claude drive a real browser (navigate, click,
        # snapshot, fill forms). Needs Node >= 22 — the qmd step above already
        # installed it via nvm if the base image's node was too old, so source
        # nvm here to get the right node/npm on PATH in this non-login shell.
        [ -s "$HOME/.nvm/nvm.sh" ] && . "$HOME/.nvm/nvm.sh" || true

        # Install the package into the npm global cache. We do NOT rely on the
        # bin name it exposes — recent releases renamed it (playwright-mcp → mcp)
        # and it has never been "mcp-server-playwright". The MCP server is
        # launched via `npx @playwright/mcp` in the registration step below,
        # which is the invocation Microsoft documents.
        npm install -g @playwright/mcp

        # Install the Chromium browser the MCP will drive. CRITICAL: we must use
        # the playwright CLI *bundled inside @playwright/mcp*, NOT a bare
        # `npx playwright install`. The MCP pins a specific (often alpha)
        # playwright version — e.g. mcp 0.0.78 → playwright 1.62-alpha, browser
        # revision chromium-1232 — whereas bare `npx playwright` resolves to the
        # latest stable (1.61.1 → a DIFFERENT revision). Installing with the
        # wrong CLI downloads a browser revision the MCP does not look for at
        # runtime, so the MCP reports "browser not installed" and it has to be
        # re-installed inside the session. Resolving the browser download through
        # the MCP's own node_modules keeps the revision in lockstep.
        MCP_DIR="$(npm root -g)/@playwright/mcp"
        PW_CLI="$MCP_DIR/node_modules/playwright/cli.js"
        test -f "$PW_CLI" || { echo "MISSING: bundled playwright CLI at $PW_CLI"; exit 1; }
        # install-deps needs root (system libs); the browser download runs as the
        # agent user so the cache lands in $HOME/.cache/ms-playwright.
        sudo env "PATH=$PATH" node "$PW_CLI" install-deps chromium
        node "$PW_CLI" install chromium

        # Persist the npm-global bin dir (idempotent) so startup scripts running
        # as a fresh `su ... bash -lc` can resolve npx and the package.
        NPM_BIN="$(npm config get prefix)/bin"
        grep -q "$NPM_BIN" /etc/sandbox-persistent.sh 2>/dev/null || \
            echo "export PATH=\"$NPM_BIN:\$PATH\"" | sudo tee -a /etc/sandbox-persistent.sh >/dev/null

        # Verify: the bundled playwright must report chromium as installed, and
        # the package itself must answer --version (bin-name agnostic).
        node "$PW_CLI" install --list 2>/dev/null | grep -q 'chromium-' \
            || { echo "MISSING: chromium not installed for the MCP's playwright revision"; exit 1; }
        npx --yes @playwright/mcp --version >/dev/null 2>&1 || { echo "MISSING: @playwright/mcp after npm install"; exit 1; }
        echo "[OK] Playwright MCP installed: $(npx --yes @playwright/mcp --version 2>/dev/null || echo unknown)"
      user: "1000"
      description: Install Playwright MCP (browser automation) + Chromium

    - command: 'uv run --with model2vec python -c "from model2vec import StaticModel; StaticModel.from_pretrained(''minishlab/potion-code-16M'')"'
      user: "1000"

    - command: |
        set -euo pipefail
        mkdir -p "$HOME/.claude/agents"
        cp "$HOME/.local/share/uv/tools/semble/lib/python"*/site-packages/semble/agents/claude.md \
           "$HOME/.claude/agents/semble-search.md"
      user: "1000"

    - command: |
        set -euo pipefail
        for d in searchx deep-research council; do
          test -d "/home/agent/.claude/skills/$d" || { echo "MISSING: $d"; exit 1; }
        done
        ls /home/agent/.claude/skills/wiki-* >/dev/null || { echo "MISSING: wiki-*"; exit 1; }
        command -v semble >/dev/null || { echo "MISSING: semble"; exit 1; }
        test -f /home/agent/.claude/agents/semble-search.md || { echo "MISSING: semble-search agent"; exit 1; }
        # qmd + playwright-mcp — source nvm so PATH is populated in this non-login shell
        [ -s "$HOME/.nvm/nvm.sh" ] && . "$HOME/.nvm/nvm.sh" || true
        command -v qmd >/dev/null || { echo "MISSING: qmd"; exit 1; }
        npx --yes @playwright/mcp --version >/dev/null 2>&1 || { echo "MISSING: @playwright/mcp"; exit 1; }
        # The MCP's bundled playwright must have a matching chromium revision on
        # disk, else the MCP falls back to "browser not installed" at runtime.
        node "$(npm root -g)/@playwright/mcp/node_modules/playwright/cli.js" install --list 2>/dev/null \
            | grep -q 'chromium-' || { echo "MISSING: chromium for playwright-mcp revision"; exit 1; }
        echo "[OK] all skills, semble, semble-search agent, qmd, and playwright-mcp (with chromium) present"
      user: "1000"
      description: Verify install

  startup:
    - command:
        - sh
        - -c
        - "git clone --depth 1 https://github.com/gaborbencsik/ai /tmp/gb-skills"
      user: "1000"
      description: Clone gaborbencsik/ai to /tmp/gb-skills

    - command:
        - sh
        - -c
        - |
          set -euo pipefail
          mkdir -p /home/agent/.claude/hooks
          cp /tmp/gb-skills/hooks/post-summary/post-response-summary.sh \
             /home/agent/.claude/hooks/post-response-summary.sh
          chmod +x /home/agent/.claude/hooks/post-response-summary.sh
          jq --slurpfile h /tmp/gb-skills/hooks/post-summary/post-summary.json \
             '.hooks = $h[0]' /home/agent/.claude/settings.json \
             > /tmp/settings.json.new
          mv /tmp/settings.json.new /home/agent/.claude/settings.json
      user: "1000"
      description: Install Stop hook from gaborbencsik/ai (idempotent)

    - command:
        - sh
        - -c
        - |
          set -euo pipefail
          # Land the two agent plugins under the skills-dir. Each dir carries a
          # .claude-plugin/ so Claude Code auto-registers it as a plugin and
          # exposes its agents as namespaced subagents (developer:software-engineer,
          # product-marketing:story-writer, …), toggleable via /plugin. We do NOT
          # copy agents flat into ~/.claude/agents anymore: the namespaced plugin
          # form is what lets whole capability sets be switched on/off.
          mkdir -p /home/agent/.claude/skills
          for p in developer product-marketing; do
              if [ -d "/tmp/gb-skills/plugins/$p" ]; then
                  rm -rf "/home/agent/.claude/skills/$p"
                  cp -r "/tmp/gb-skills/plugins/$p" "/home/agent/.claude/skills/$p"
                  test -f "/home/agent/.claude/skills/$p/.claude-plugin/plugin.json" \
                      || { echo "MISSING: $p/.claude-plugin/plugin.json after copy"; exit 1; }
                  echo "[agents] installed plugin: $p"
              else
                  echo "[agents] WARNING: /tmp/gb-skills/plugins/$p missing, skipping"
              fi
          done
      user: "1000"
      description: Install developer + product-marketing agent plugins from gaborbencsik/ai (idempotent)

    - command:
        - sh
        - -c
        - |
          python3 - <<'PY'
          import json, os, pathlib, stat
          # Seed enabledPlugins so a fresh sandbox starts with a LEAN always-on
          # context: all three plugins register (auto-discovered from skills-dir)
          # but load DISABLED, keeping their agent descriptions out of the system
          # prompt until switched on via /plugin. Keys not listed here keep Claude
          # Code's default. NOTE: the authoritative store is ~/.claude/settings.json
          # (the top-level ~/.claude.json is app-state and is NOT read for this) —
          # so we merge into settings.json, preserving hooks and other keys.
          desired = {
              "council@skills-dir": False,
              "developer@skills-dir": False,
              "product-marketing@skills-dir": False,
          }
          p = pathlib.Path.home() / ".claude" / "settings.json"
          cfg = {}
          if p.exists():
              try:
                  cfg = json.loads(p.read_text())
              except Exception:
                  cfg = {}
          enabled = cfg.get("enabledPlugins")
          if not isinstance(enabled, dict):
              enabled = {}
          changed = False
          for name, state in desired.items():
              if enabled.get(name) != state:
                  enabled[name] = state
                  changed = True
          if not changed:
              print("[OK] enabledPlugins already seeded, no change")
          else:
              cfg["enabledPlugins"] = enabled
              p.parent.mkdir(parents=True, exist_ok=True)
              if p.exists():
                  os.chmod(p, p.stat().st_mode | stat.S_IWUSR)
              p.write_text(json.dumps(cfg, indent=2) + "\n")
              print("[OK] seeded enabledPlugins in settings.json: council + developer + product-marketing all off")
          PY
      user: "1000"
      description: Seed enabledPlugins in ~/.claude/settings.json (council + developer + product-marketing all off; idempotent)

    - command:
        - sh
        - -c
        - |
          set -euo pipefail
          mkdir -p /home/agent/.claude/skills/semble-search /home/agent/.claude/commands
          cp /tmp/gb-skills/skills/semble-search/SKILL.md \
             /home/agent/.claude/skills/semble-search/SKILL.md
          cp /tmp/gb-skills/commands/semble.md \
             /home/agent/.claude/commands/semble.md
      user: "1000"
      description: Install semble skill+command from gaborbencsik/ai (idempotent)

    - command:
        - sh
        - -c
        - |
          set -euo pipefail
          mkdir -p /home/agent/.claude/skills/qmd /home/agent/.claude/commands
          cp /tmp/gb-skills/skills/qmd/SKILL.md \
             /home/agent/.claude/skills/qmd/SKILL.md
          cp /tmp/gb-skills/commands/qmd.md \
             /home/agent/.claude/commands/qmd.md
      user: "1000"
      description: Install qmd skill+command from gaborbencsik/ai (idempotent)

    - command:
        - sh
        - -c
        - |
          set -euo pipefail
          mkdir -p /home/agent/.claude/skills/md-to-slides /home/agent/.claude/commands
          cp /tmp/gb-skills/skills/md-to-slides/SKILL.md \
             /home/agent/.claude/skills/md-to-slides/SKILL.md
          cp /tmp/gb-skills/commands/slides.md \
             /home/agent/.claude/commands/slides.md
          rm -rf /tmp/gb-skills
      user: "1000"
      description: Install md-to-slides skill+command from gaborbencsik/ai and clean up (idempotent)

    - command:
        - sh
        - -c
        - |
          python3 - <<'PY'
          import json, os, pathlib, stat
          p = pathlib.Path.home() / ".claude.json"
          cfg = {}
          if p.exists():
              try:
                  cfg = json.loads(p.read_text())
              except Exception:
                  cfg = {}
          servers = cfg.get("mcpServers") or {}
          desired_servers = {
              "semble":     {"type": "stdio", "command": "semble",                 "args": []},
              "qmd":        {"type": "stdio", "command": "qmd",                    "args": ["mcp"]},
              # --browser chromium is REQUIRED: @playwright/mcp defaults to
              # channel:"chrome" (system Google Chrome at /opt/google/chrome/chrome),
              # which does not exist here and has no arm64 build. This flag makes it
              # launch the bundled Chromium we downloaded via `playwright install`.
              "playwright": {"type": "stdio", "command": "npx", "args": ["-y", "@playwright/mcp", "--browser", "chromium", "--headless", "--isolated"]},
          }
          changed = False
          for name, spec in desired_servers.items():
              if servers.get(name) != spec:
                  servers[name] = spec
                  changed = True
          if not changed:
              print("[OK] semble + qmd + playwright MCP servers already registered, no change")
          else:
              cfg["mcpServers"] = servers
              if p.exists():
                  os.chmod(p, p.stat().st_mode | stat.S_IWUSR)
              p.write_text(json.dumps(cfg, indent=2) + "\n")
              print("[OK] semble + qmd + playwright MCP servers registered in ~/.claude.json")
          PY
      user: "1000"
      description: Register semble + qmd + playwright MCP servers in ~/.claude.json (idempotent)

    - command:
        - bash
        - -lc
        - |
          set -euo pipefail

          # qmd is on PATH via /etc/sandbox-persistent.sh (append happens
          # in the install step). -lc sources the persistent env.
          command -v qmd >/dev/null || { echo "[qmd-index] qmd not found, skipping"; exit 0; }

          # Pick project root: clone mode exposes the host repo read-only at
          # /run/sandbox/source; direct mode mounts the working tree at
          # $WORKSPACE_DIR (set on PID 1's env, survives `su + bash -lc`).
          # Do NOT fall back to $PWD — the dispatcher's `su` lands in
          # /home/agent/workspace, which is empty, and would create an
          # empty collection.
          if [ -d /run/sandbox/source ]; then
            PROJECT_ROOT=/run/sandbox/source
          elif [ -n "${WORKSPACE_DIR:-}" ] && [ -d "$WORKSPACE_DIR" ]; then
            PROJECT_ROOT="$WORKSPACE_DIR"
          else
            echo "[qmd-index] WORKSPACE_DIR unset and no /run/sandbox/source; skipping"
            exit 0
          fi
          echo "[qmd-index] project root: $PROJECT_ROOT"

          # Persist qmd's data (SQLite index + ~319 MB embedding model)
          # across `sbx rm` by symlinking ~/.cache/qmd to a directory
          # inside the workspace, which is bind-mounted from the host.
          # Without this, every recreate re-downloads the model (~6s) and
          # re-embeds every doc (~28s). See .gitignore for the exclude.
          PERSIST_CACHE="$PROJECT_ROOT/.qmd-cache"
          mkdir -p "$PERSIST_CACHE"
          CACHE_LINK="$HOME/.cache/qmd"
          mkdir -p "$HOME/.cache"
          if [ -L "$CACHE_LINK" ]; then
            # Already a symlink — retarget if needed (ln -sfn is idempotent).
            ln -sfn "$PERSIST_CACHE" "$CACHE_LINK"
            echo "[qmd-index] cache already symlinked → $PERSIST_CACHE"
          elif [ -d "$CACHE_LINK" ]; then
            if [ -z "$(ls -A "$CACHE_LINK" 2>/dev/null)" ]; then
              rmdir "$CACHE_LINK"
              ln -s "$PERSIST_CACHE" "$CACHE_LINK"
              echo "[qmd-index] linked empty cache dir → $PERSIST_CACHE"
            else
              # Migrate existing cache to the persistent location.
              # cp -an keeps host-side files if a collision exists.
              echo "[qmd-index] migrating existing cache → $PERSIST_CACHE"
              cp -an "$CACHE_LINK"/. "$PERSIST_CACHE"/ || true
              rm -rf "$CACHE_LINK"
              ln -s "$PERSIST_CACHE" "$CACHE_LINK"
            fi
          else
            ln -s "$PERSIST_CACHE" "$CACHE_LINK"
            echo "[qmd-index] linked fresh cache → $PERSIST_CACHE"
          fi

          export QMD_HOME="$HOME/.qmd"
          mkdir -p "$QMD_HOME"

          # Dedicated 'project' collection so results don't mix with
          # wiki-*/notes. `qmd collection show` prints "Collection not
          # found:" to stdout and still exits 0, so check the output.
          if qmd collection show project 2>&1 | grep -q '^Collection: project'; then
            echo "[qmd-index] 'project' collection exists, re-indexing"
            qmd update -c project || echo "[qmd-index] update failed (non-fatal)"
          else
            echo "[qmd-index] creating 'project' collection at $PROJECT_ROOT"
            qmd collection add "$PROJECT_ROOT" \
                --name project \
                --include '**/*.md' \
                --exclude 'node_modules/**' \
                --exclude '.git/**' \
                --exclude 'dist/**' \
                --exclude 'build/**' \
                || echo "[qmd-index] collection add failed (non-fatal)"
          fi

          # Embedding is slow on first run (downloads a ~330MB model) — kick
          # it off in the background so startup returns quickly. Until it
          # finishes only lex (BM25) search works; vec/hyde come online once
          # the log reports done.
          nohup qmd embed >/tmp/qmd-embed.log 2>&1 &
          echo "[qmd-index] embedding started in background (log: /tmp/qmd-embed.log)"
      user: "1000"
      description: Index the project's markdown into qmd on startup (incremental)
